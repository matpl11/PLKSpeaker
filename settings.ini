[general]
station = 5100011
; Minimalne pobieranie co 5 minut (300s). Wartości niższe są ignorowane.
poll_seconds = 300
lookahead_minutes = 120

[jingle]
file = jingle.mp3

[audio]
volume = 80
pause_after_jingle_ms = 200

[tts]
voice = pl-PL-ZofiaNeural
rate  = +0%  

; ─────────────────────────────────────────────────────────────────────────────
; Szablony komunikatów. Dostępne zmienne:
;   {train_code}  – numer pociągu, np. "IC 5424"
;   {dest}        – stacja docelowa
;   {track}       – tor
;   {platform}    – peron
;   {delay_min}   – opóźnienie w minutach (zaokrąglone do 5)
;   {scheduled_time} - planowy odjazd
;   {departure_time} - rzeczywisty odjazd
; ─────────────────────────────────────────────────────────────────────────────
[messages]
departure_on_time =
    Pociąg {train_code} do stacji {dest}.
    Odjedzie z toru {track}, przy peronie {platform}.
	Prosimy zachować ostrożność i nie zbliżać się do krawędzi peronu.
	Planowy odjazd pociągu o godzinie {scheduled_time}.

departure_delayed =
    Opóźniony pociąg {train_code} do stacji {dest}.
    Odjedzie z toru {track}., przy peronie {platform}.

delay_reminder =
    Pociąg {train_code} do stacji {dest}, planowy odjazd pociągu o godzinie {scheduled_time}
    jest opóźniony o około {delay_min} minut.
	Opóźnienie może ulec zmianie, za opóźnienie serdecznie państwa przepraszamy.

